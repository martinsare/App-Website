openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Android App Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: apps
    description: Public app operations
  - name: admin
    description: Admin operations
  - name: auth
    description: Authentication operations
  - name: analytics
    description: Analytics operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Public ──────────────────────────────────────────────────────────────────

  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List all published apps
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of published apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"

  /apps/featured:
    get:
      operationId: listFeaturedApps
      tags: [apps]
      summary: List featured apps for landing page
      responses:
        "200":
          description: Featured apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"

  /apps/{slug}:
    get:
      operationId: getApp
      tags: [apps]
      summary: Get app details by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "404":
          description: Not found

  /apps/{slug}/versions:
    get:
      operationId: listAppVersions
      tags: [apps]
      summary: List versions for a published app
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppVersion"

  /downloads:
    post:
      operationId: recordDownload
      tags: [apps]
      summary: Record a download event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadInput"
      responses:
        "201":
          description: Download recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download"

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  # ── Admin Apps ───────────────────────────────────────────────────────────────

  /admin/apps:
    get:
      operationId: adminListApps
      tags: [admin]
      summary: List all apps including unpublished
      responses:
        "200":
          description: All apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminApp"
    post:
      operationId: createApp
      tags: [admin]
      summary: Create a new app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppInput"
      responses:
        "201":
          description: Created app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApp"

  /admin/apps/{id}:
    get:
      operationId: adminGetApp
      tags: [admin]
      summary: Get admin app by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApp"
        "404":
          description: Not found
    patch:
      operationId: updateApp
      tags: [admin]
      summary: Update app metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUpdate"
      responses:
        "200":
          description: Updated app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApp"
    delete:
      operationId: deleteApp
      tags: [admin]
      summary: Delete an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/apps/{appId}/versions:
    get:
      operationId: adminListVersions
      tags: [admin]
      summary: List all versions for an app
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppVersion"
    post:
      operationId: createVersion
      tags: [admin]
      summary: Add a new version for an app
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionInput"
      responses:
        "201":
          description: Created version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppVersion"

  /admin/versions/{id}:
    patch:
      operationId: updateVersion
      tags: [admin]
      summary: Update a version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionUpdate"
      responses:
        "200":
          description: Updated version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppVersion"
    delete:
      operationId: deleteVersion
      tags: [admin]
      summary: Delete a version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Admin Analytics ──────────────────────────────────────────────────────────

  /admin/analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /admin/analytics/downloads-over-time:
    get:
      operationId: getDownloadsOverTime
      tags: [analytics]
      summary: Downloads grouped by day
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [week, month, year]
      responses:
        "200":
          description: Daily download counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DownloadDataPoint"

  /admin/analytics/top-apps:
    get:
      operationId: getTopApps
      tags: [analytics]
      summary: Most downloaded apps
      responses:
        "200":
          description: Top apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppDownloadStat"

  /admin/analytics/recent-downloads:
    get:
      operationId: getRecentDownloads
      tags: [analytics]
      summary: Recent download records
      responses:
        "200":
          description: Recent downloads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentDownload"

  /admin/dashboard:
    get:
      operationId: getDashboardStats
      tags: [admin]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Domain entities ────────────────────────────────────────────────────────

    App:
      type: object
      required: [id, name, slug, shortDescription, iconUrl, latestVersion, releaseDate, isPublished, createdAt]
      properties:
        id:          { type: string }
        name:        { type: string }
        slug:        { type: string }
        shortDescription: { type: string }
        iconUrl:     { type: ["string", "null"] }
        latestVersion: { type: ["string", "null"] }
        releaseDate: { type: ["string", "null"] }
        isPublished: { type: boolean }
        createdAt:   { type: string }
        totalDownloads: { type: integer }

    AppDetail:
      type: object
      required: [id, name, slug, shortDescription, fullDescription, iconUrl, latestVersion, fileSize, releaseDate, isPublished, screenshots, versions, createdAt]
      properties:
        id:               { type: string }
        name:             { type: string }
        slug:             { type: string }
        shortDescription: { type: string }
        fullDescription:  { type: string }
        iconUrl:          { type: ["string", "null"] }
        latestVersion:    { type: ["string", "null"] }
        fileSize:         { type: ["string", "null"] }
        releaseDate:      { type: ["string", "null"] }
        isPublished:      { type: boolean }
        screenshots:
          type: array
          items:
            $ref: "#/components/schemas/Screenshot"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/AppVersion"
        changelog:        { type: ["string", "null"] }
        totalDownloads:   { type: integer }
        createdAt:        { type: string }

    AdminApp:
      type: object
      required: [id, name, slug, shortDescription, fullDescription, iconUrl, isPublished, createdAt, updatedAt]
      properties:
        id:               { type: string }
        name:             { type: string }
        slug:             { type: string }
        shortDescription: { type: string }
        fullDescription:  { type: string }
        iconUrl:          { type: ["string", "null"] }
        isPublished:      { type: boolean }
        createdAt:        { type: string }
        updatedAt:        { type: string }
        latestVersion:    { type: ["string", "null"] }
        totalDownloads:   { type: integer }

    AppVersion:
      type: object
      required: [id, appId, versionNumber, apkUrl, fileSize, changelog, isLatest, isPublished, releaseDate, createdAt]
      properties:
        id:            { type: string }
        appId:         { type: string }
        versionNumber: { type: string }
        apkUrl:        { type: string }
        fileSize:      { type: ["string", "null"] }
        changelog:     { type: ["string", "null"] }
        isLatest:      { type: boolean }
        isPublished:   { type: boolean }
        releaseDate:   { type: string }
        createdAt:     { type: string }

    Screenshot:
      type: object
      required: [id, appId, imageUrl, sortOrder, createdAt]
      properties:
        id:        { type: string }
        appId:     { type: string }
        imageUrl:  { type: string }
        sortOrder: { type: integer }
        createdAt: { type: string }

    Download:
      type: object
      required: [id, appId, versionId, downloadedAt]
      properties:
        id:           { type: string }
        appId:        { type: string }
        versionId:    { type: string }
        downloadedAt: { type: string }
        userAgent:    { type: ["string", "null"] }
        ipAddress:    { type: ["string", "null"] }
        referrer:     { type: ["string", "null"] }

    AuthUser:
      type: object
      required: [id, email, role]
      properties:
        id:    { type: string }
        email: { type: string }
        role:  { type: string }

    AnalyticsSummary:
      type: object
      required: [totalDownloads, downloadsToday, downloadsThisWeek, downloadsThisMonth, totalApps]
      properties:
        totalDownloads:    { type: integer }
        downloadsToday:    { type: integer }
        downloadsThisWeek: { type: integer }
        downloadsThisMonth: { type: integer }
        totalApps:         { type: integer }

    DownloadDataPoint:
      type: object
      required: [date, count]
      properties:
        date:  { type: string }
        count: { type: integer }

    AppDownloadStat:
      type: object
      required: [appId, appName, iconUrl, totalDownloads, percentage]
      properties:
        appId:          { type: string }
        appName:        { type: string }
        iconUrl:        { type: ["string", "null"] }
        totalDownloads: { type: integer }
        percentage:     { type: number }

    RecentDownload:
      type: object
      required: [id, appName, versionNumber, downloadedAt, userAgent]
      properties:
        id:            { type: string }
        appName:       { type: string }
        versionNumber: { type: string }
        downloadedAt:  { type: string }
        userAgent:     { type: ["string", "null"] }
        ipAddress:     { type: ["string", "null"] }

    DashboardStats:
      type: object
      required: [totalApps, totalDownloads, downloadsToday, latestVersion, mostDownloadedApp, recentDownloads, weeklyDownloads]
      properties:
        totalApps:          { type: integer }
        totalDownloads:     { type: integer }
        downloadsToday:     { type: integer }
        latestVersion:      { type: ["string", "null"] }
        mostDownloadedApp:
          type: ["object", "null"]
          properties:
            name: { type: string }
            downloads: { type: integer }
        recentDownloads:
          type: array
          items:
            $ref: "#/components/schemas/RecentDownload"
        weeklyDownloads:
          type: array
          items:
            $ref: "#/components/schemas/DownloadDataPoint"

    # ── Input schemas (entity-shaped, never <OperationId>Body) ─────────────────

    AppInput:
      type: object
      required: [name, shortDescription, fullDescription]
      properties:
        name:             { type: string, minLength: 1 }
        shortDescription: { type: string }
        fullDescription:  { type: string }
        iconUrl:          { type: string }
        isPublished:      { type: boolean }

    AppUpdate:
      type: object
      properties:
        name:             { type: string }
        shortDescription: { type: string }
        fullDescription:  { type: string }
        iconUrl:          { type: string }
        isPublished:      { type: boolean }

    VersionInput:
      type: object
      required: [versionNumber, apkUrl]
      properties:
        versionNumber: { type: string, minLength: 1 }
        apkUrl:        { type: string }
        fileSize:      { type: string }
        changelog:     { type: string }
        isLatest:      { type: boolean }
        isPublished:   { type: boolean }
        releaseDate:   { type: string }

    VersionUpdate:
      type: object
      properties:
        versionNumber: { type: string }
        apkUrl:        { type: string }
        fileSize:      { type: string }
        changelog:     { type: string }
        isLatest:      { type: boolean }
        isPublished:   { type: boolean }
        releaseDate:   { type: string }

    DownloadInput:
      type: object
      required: [appId, versionId]
      properties:
        appId:     { type: string }
        versionId: { type: string }
        userAgent: { type: string }
        referrer:  { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string }
        password: { type: string }
